name: Travlo  Live in Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |

            git pull origin main

            docker-compose down

            docker system prune -f

            docker-compose build --no-cache

            docker-compose up -d

            docker ps